<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hallucination Identification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --electric-moss: #d5eab1;
            --amethyst: #a855f7;
            --deep-forest: #0d1a01;
            --parchment: #dfca94;
        }

        body {
            background-color: var(--deep-forest);
            color: white;
            font-family: 'EB Garamond', serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            cursor: none;
        }

        /* --- BACKGROUND SCENE --- */
        .scene {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 15% 15%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(213, 234, 177, 0.1) 0%, transparent 40%);
            z-index: -1;
        }

        .noise-overlay {
            position: fixed;
            inset: -50%;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.12;
            pointer-events: none;
            z-index: 1;
        }

        /* --- DECORATIVE VINES --- */
        .vine-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.4;
            z-index: 5;
        }

        /* --- FLOATING ANIMATIONS --- */
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0) rotate(0deg); }
            33% { transform: translateY(-20px) translateX(10px) rotate(1deg); }
            66% { transform: translateY(10px) translateX(-15px) rotate(-1deg); }
        }

        /* --- GLASS & PARCHMENT HEADER --- */
        .hero-container {
            position: relative;
            z-index: 100;
            padding-top: 4vh;
            text-align: center;
        }

        .glass-header {
            display: inline-block;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem 4rem;
            border-radius: 4px;
            position: relative;
        }

        .glass-header::before, .glass-header::after {
            content: ""; position: absolute; width: 20px; height: 20px;
            border-color: var(--electric-moss); border-style: solid;
        }
        .glass-header::before { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
        .glass-header::after { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

        .main-title {
            font-family: 'Cinzel Decorative', serif;
            font-size: 3.5rem;
            letter-spacing: 0.15em;
            background: linear-gradient(to bottom, #ffffff 40%, var(--electric-moss) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* --- ABOUT BUTTON --- */
        .about-btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.6rem 2.5rem;
            background: rgba(213, 234, 177, 0.05);
            border: 1px solid rgba(213, 234, 177, 0.3);
            color: var(--electric-moss);
            font-family: 'Cinzel Decorative', serif;
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .about-btn:hover {
            background: rgba(213, 234, 177, 0.15);
            border-color: var(--electric-moss);
            box-shadow: 0 0 20px rgba(213, 234, 177, 0.3);
            transform: translateY(-2px);
            color: white;
        }

        /* --- PORTALS (PARCHMENT BUBBLES) --- */
        .bubble-wrap {
            position: absolute;
            animation: float 8s infinite ease-in-out;
        }

        .portal {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: 
                url("https://www.transparenttextures.com/patterns/natural-paper.png"),
                radial-gradient(circle, rgba(223, 202, 148, 0.15) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(213, 234, 177, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            text-decoration: none;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }

        .portal:hover {
            transform: scale(1.1) translateY(-10px);
            border-color: var(--electric-moss);
            box-shadow: 0 0 50px rgba(213, 234, 177, 0.2), inset 0 0 10px rgba(213, 234, 177, 0.2);
        }

        .index-num {
            position: absolute;
            top: 25px;
            font-family: 'EB Garamond';
            font-size: 0.7rem;
            color: var(--parchment);
            opacity: 0.6;
            letter-spacing: 2px;
        }

        .inner-ring {
            position: absolute;
            inset: 15px;
            border: 0.5px solid rgba(213, 234, 177, 0.1);
            border-radius: 50%;
        }

        /* --- CURSOR --- */
        #cursor-dot { position: fixed; width: 6px; height: 6px; background: white; border-radius: 50%; pointer-events: none; z-index: 1000; mix-blend-mode: difference; }
        #cursor-ring { position: fixed; width: 40px; height: 40px; border: 1px solid var(--electric-moss); border-radius: 50%; pointer-events: none; z-index: 999; transition: transform 0.2s; }

        /* --- MUSHROOMS --- */
        .mushroom { position: absolute; bottom: 20px; display: flex; flex-direction: column; align-items: center; }
        .cap { width: 40px; height: 25px; background: var(--amethyst); border-radius: 20px 20px 5px 5px; opacity: 0.8; }
        .stem { width: 12px; height: 20px; background: #999; border-radius: 0 0 5px 5px; }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>
    <div class="noise-overlay"></div>
    <div class="scene"></div>

    <svg class="vine-container" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
        <path d="M-50,650 Q100,400 300,450 T600,200 T850,50" fill="none" stroke="#96b63f" stroke-width="2" stroke-dasharray="5 5" />
        <path d="M850,650 Q700,400 500,450 T200,200 T-50,50" fill="none" stroke="#96b63f" stroke-width="1.5" opacity="0.5" />
        <circle cx="200" cy="420" r="3" fill="#96b63f" />
        <circle cx="500" cy="250" r="4" fill="#d5eab1" />
        <circle cx="700" cy="120" r="2" fill="#96b63f" />
    </svg>

    <header class="hero-container">
        <div class="glass-header">
            <h1 class="main-title"> HALLUCINATION<br>IDENTIFICATION</h1>
            <p class="text-stone-400 uppercase tracking-[0.2em] text-[15px] mt-6 font-bold">Identify our generated fabrications through <br> a series of paragraph questions</p>
            
            <a href="about.html" class="about-btn interactable">About</a>
        </div>
    </header>

    <div class="relative w-full h-[54vh] mt-0">
        <div class="bubble-wrap" style="left: 9%; top: -3%; animation-delay: 0s;">
            <a href="level1.html" class="portal interactable">
                <div class="inner-ring"></div>
                <span class="text-[10px] tracking-widest text-stone-500 mb-1 italic">Manuscript</span>
                <h2 class="font-['Cinzel_Decorative'] text-2xl text-[#d5eab1]">BIOLOGY</h2>
                <span class="text-[9px] uppercase tracking-[3px] text-purple-400 mt-4">Open</span>
            </a>
        </div>

        <div class="bubble-wrap" style="left: 25%; top: 9%; animation-delay: -2s; animation-duration: 10s;">
            <a href="level2.html" class="portal interactable">
                <div class="inner-ring"></div>
                <span class="text-[10px] tracking-widest text-stone-500 mb-1 italic">Archive</span>
                <h2 class="font-['Cinzel_Decorative'] text-2xl text-[#d5eab1]">HISTORY</h2>
                <span class="text-[9px] uppercase tracking-[3px] text-amber-300 mt-4">Open</span>
            </a>
        </div>

        <div class="bubble-wrap" style="left: 41%; top: -7%; animation-delay: -4s; animation-duration: 9s;">
            <a href="level3.html" class="portal interactable">
                <div class="inner-ring"></div>
                <span class="text-[10px] tracking-widest text-stone-500 mb-1 italic">Lab Notes</span>
                <h2 class="font-['Cinzel_Decorative'] text-2xl text-[#d5eab1]">PHYSICS</h2>
                <span class="text-[9px] uppercase tracking-[3px] text-cyan-300 mt-4">Open</span>
            </a>
        </div>

        <div class="bubble-wrap" style="right: 23%; top: 7%; animation-delay: -1s; animation-duration: 11s;">
            <a href="level4.html" class="portal interactable">
                <div class="inner-ring"></div>
                <span class="text-[10px] tracking-widest text-stone-500 mb-1 italic">Codex</span>
                <h2 class="font-['Cinzel_Decorative'] text-2xl text-[#d5eab1]">LITERATURE</h2>
                <span class="text-[9px] uppercase tracking-[3px] text-fuchsia-300 mt-4">Open</span>
            </a>
        </div>

        <div class="bubble-wrap" style="right: 7%; top: -4%; animation-delay: -5s; animation-duration: 8.5s;">
            <a href="level5.html" class="portal interactable">
                <div class="inner-ring"></div>
                <span class="text-[10px] tracking-widest text-stone-500 mb-1 italic">Formula</span>
                <h2 class="font-['Cinzel_Decorative'] text-2xl text-[#d5eab1]">CHEMISTRY</h2>
                <span class="text-[9px] uppercase tracking-[3px] text-green-300 mt-4">Open</span>
            </a>
        </div>

    </div>

    <div class="mushroom" style="left: 10%; scale: 0.7;">
        <div class="cap" style="background: #bef264;"></div>
        <div class="stem"></div>
    </div>
    
    <div class="mushroom" style="right: 8%; bottom: 30px; scale: 1.1;">
        <div class="cap"></div>
        <div class="stem"></div>
    </div>

    <script>
        const dot = document.getElementById('cursor-dot');
        const ring = document.getElementById('cursor-ring');
        const interactables = document.querySelectorAll('.interactable');

        let posX = 0, posY = 0;
        let ringX = 0, ringY = 0;

        document.addEventListener('mousemove', (e) => {
            posX = e.clientX;
            posY = e.clientY;
            dot.style.left = posX + 'px';
            dot.style.top = posY + 'px';
        });

        function updateCursor() {
            ringX += (posX - ringX - 20) * 0.15;
            ringY += (posY - ringY - 20) * 0.15;
            ring.style.left = ringX + 'px';
            ring.style.top = ringY + 'px';
            requestAnimationFrame(updateCursor);
        }
        updateCursor();

        interactables.forEach(el => {
            el.addEventListener('mouseenter', () => {
                ring.style.transform = 'scale(2.5)';
                ring.style.borderColor = 'white';
            });
            el.addEventListener('mouseleave', () => {
                ring.style.transform = 'scale(1)';
                ring.style.borderColor = 'var(--electric-moss)';
            });
        });
    </script>
</body>
</html>
